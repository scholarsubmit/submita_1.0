<!-- templates/email_verified.html -->
{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100 py-12 px-4">
    <div class="max-w-md mx-auto">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden text-center">
            <!-- Header -->
            <div class="bg-gradient-to-r from-emerald-600 to-emerald-700 px-6 py-8">
                <div class="w-24 h-24 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-check-circle text-white text-4xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-white">Email Verified!</h1>
            </div>
            
            <!-- Content -->
            <div class="p-6">
                <p class="text-gray-700 mb-4">
                    Your email has been successfully verified. Your account is now active.
                </p>
                
                <div class="bg-emerald-50 rounded-xl p-4 mb-6">
                    <p class="text-sm text-emerald-800">
                        <i class="fas fa-check-circle mr-2"></i>
                        You can now log in using your Student ID or Email address.
                    </p>
                </div>
                
                <a href="{{ url_for('login') }}" 
                   class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-medium transition block text-center">
                    Login to Submita →
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
