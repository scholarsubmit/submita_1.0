{% extends "base.html" %}

{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-4 py-12">
    <div class="max-w-2xl w-full text-center">
        <!-- Server Icon -->
        <div class="relative mb-8">
            <div class="w-32 h-32 mx-auto bg-gradient-to-br from-red-500 to-orange-600 rounded-full flex items-center justify-center shadow-2xl">
                <i class="fas fa-server text-white text-5xl"></i>
            </div>
        </div>
        
        <!-- Error Message -->
        <h1 class="text-6xl font-bold text-gray-900 mb-4">500</h1>
        <h2 class="text-2xl font-semibold text-gray-700 mb-4">Internal Server Error</h2>
        <p class="text-gray-500 mb-8 max-w-md mx-auto">
            Something went wrong on our end. Our technical team has been notified and is working on a fix.
        </p>
        
        <!-- Quick Actions -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <button onclick="location.reload()" 
                    class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-red-600 hover:bg-red-700 text-white rounded-xl font-semibold transition-all transform hover:scale-105 shadow-lg">
                <i class="fas fa-sync-alt"></i>
                Try Again
            </button>
            <a href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('home') }}" 
               class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-semibold transition-all">
                <i class="fas fa-home"></i>
                Go Home
            </a>
        </div>
        
        <!-- Support Link -->
        <p class="mt-8 text-sm text-gray-500">
            Need help? <a href="#" class="text-red-600 hover:underline">Contact Support</a>
        </p>
    </div>
</div>
{% endblock %}
