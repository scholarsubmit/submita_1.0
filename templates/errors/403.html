{% extends "base.html" %}

{% block title %}403 - Access Denied{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-4 py-12">
    <div class="max-w-2xl w-full text-center">
        <h1 class="text-6xl font-bold text-gray-900 mb-4">403</h1>
        <h2 class="text-2xl font-semibold text-gray-700 mb-4">Access Denied</h2>
        <p class="text-gray-500 mb-8">You don't have permission to access this page.</p>
        <a href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('home') }}" 
           class="inline-flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-xl transition">
            <i class="fas fa-home"></i> Go Home
        </a>
    </div>
</div>
{% endblock %}
