{% extends "base.html" %}

{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Submita</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        
        .animate-slide-in {
            animation: slideIn 0.6s ease-out forwards;
        }
        
        .error-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-2xl w-full text-center animate-slide-in">
            <!-- Animated 404 Number -->
            <div class="relative mb-8">
                <div class="text-[150px] sm:text-[200px] font-black text-indigo-100 select-none">404</div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="w-32 h-32 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-full flex items-center justify-center animate-float shadow-2xl">
                        <i class="fas fa-search text-white text-5xl"></i>
                    </div>
                </div>
            </div>
            
            <!-- Error Message -->
            <h1 class="text-3xl sm:text-4xl font-bold text-gray-800 mb-4">Page Not Found</h1>
            <p class="text-gray-600 mb-8 max-w-md mx-auto">
                Oops! The page you're looking for seems to have wandered off into the digital wilderness.
            </p>
            
            <!-- Quick Actions -->
            <div class="flex flex-col sm:flex-row gap-4 justify-center mb-12">
                <a href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('home') }}" 
                   class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-semibold transition-all transform hover:scale-105 shadow-lg">
                    <i class="fas fa-home"></i>
                    Go to Dashboard
                </a>
                <a href="javascript:history.back()" 
                   class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-semibold transition-all">
                    <i class="fas fa-arrow-left"></i>
                    Go Back
                </a>
            </div>
            
            <!-- Helpful Links -->
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 text-sm">
                <a href="{{ url_for('home') }}" class="text-gray-500 hover:text-indigo-600 transition">Homepage</a>
                <a href="#" class="text-gray-500 hover:text-indigo-600 transition">Support</a>
                <a href="#" class="text-gray-500 hover:text-indigo-600 transition">Contact Admin</a>
                <a href="#" class="text-gray-500 hover:text-indigo-600 transition">Help Center</a>
            </div>
        </div>
    </div>
    
    <!-- Decorative elements -->
    <div class="fixed bottom-0 left-0 w-64 h-64 bg-indigo-200 rounded-full blur-3xl opacity-20 pointer-events-none"></div>
    <div class="fixed top-0 right-0 w-96 h-96 bg-purple-200 rounded-full blur-3xl opacity-20 pointer-events-none"></div>
</body>
</html>
{% endblock %}
