{% extends "base.html" %}

{% block content %}
<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-4 py-12">
    <div class="text-center">
        <div class="w-32 h-32 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-hourglass-half text-yellow-600 text-5xl"></i>
        </div>
        <h1 class="text-6xl font-bold text-gray-900 mb-4">429</h1>
        <h2 class="text-2xl font-semibold text-gray-700 mb-2">Too Many Requests</h2>
        <p class="text-gray-500 mb-8">You've made too many requests. Please wait a moment and try again.</p>
        <a href="{{ url_for('dashboard') }}" class="inline-flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-xl transition">
            <i class="fas fa-home"></i> Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}
